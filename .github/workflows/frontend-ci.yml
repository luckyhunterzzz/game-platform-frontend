name: Frontend CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  checks:
    name: Run Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_KEYCLOAK_URL: https://auth.gameops-platform.dev
          NEXT_PUBLIC_KEYCLOAK_REALM: game-realm
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: game-frontend
          NEXT_PUBLIC_API_BASE_URL: https://api.gameops-platform.dev
        run: npm run build

  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: luckyhunterzzz/game-platform-frontend
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_KEYCLOAK_URL=https://auth.gameops-platform.dev
            NEXT_PUBLIC_KEYCLOAK_REALM=game-realm
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=game-frontend
            NEXT_PUBLIC_API_BASE_URL=https://api.gameops-platform.dev
